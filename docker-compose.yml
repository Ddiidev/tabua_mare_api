networks:
  tabua-mare-network:
    driver: bridge

services:
  # Instâncias da aplicação Tabua Mare
  tabua-mare1:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile.tabuamare
    image: tabua-mare-app:latest
    restart: always
    env_file:
      - ./.env
    environment:
      - PORT=4048
    deploy:
      resources:
        limits:
          cpus: "0.30"
          memory: 128M
    container_name: tabua-mare-app1
    networks:
      - tabua-mare-network
    volumes:
      - ./.env:/app/.env
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro

  tabua-mare2:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile.tabuamare
    image: tabua-mare-app:latest
    restart: always
    env_file:
      - ./.env
    environment:
      - PORT=4048
    deploy:
      resources:
        limits:
          cpus: "0.30"
          memory: 128M
    container_name: tabua-mare-app2
    networks:
      - tabua-mare-network
    volumes:
      - ./.env:/app/.env
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro

  # Nginx como balanceador de carga
  nginx:
    image: nginx:latest
    container_name: tabua-mare-nginx
    restart: always
    depends_on:
      - tabua-mare1
      - tabua-mare2
    ports:
      - "80:80"
    networks:
      - tabua-mare-network
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 100M
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/conf.d:/etc/nginx/conf.d
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro