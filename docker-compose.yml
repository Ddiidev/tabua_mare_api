name: tabuamare-local

x-app: &app
  image: tabua-mare-api:local
  build:
    context: .
    dockerfile: Dockerfile
  restart: unless-stopped
  env_file:
    - path: ${TABUAMARE_ENV_FILE:-.env}
      required: false
  environment:
    PORT: "3330"
    DB_SQLITE_PATH: /app/data/taubinha.sqlite
  healthcheck:
    test: ["CMD-SHELL", "curl -fsS -o /dev/null http://127.0.0.1:3330/health/ready"]
    interval: 10s
    timeout: 3s
    start_period: 30s
    retries: 3
  stop_grace_period: 30s
  cpus: 2.0
  mem_limit: 512m
  mem_reservation: 256m

services:
  tabuamare-a:
    <<: *app
    ports:
      - "127.0.0.1:3330:3330"
    volumes:
      - sqlite-a:/app/data

  tabuamare-b:
    <<: *app
    depends_on:
      tabuamare-a:
        condition: service_healthy
    ports:
      - "127.0.0.1:3340:3330"
    volumes:
      - sqlite-b:/app/data

volumes:
  sqlite-a:
  sqlite-b:
