upstream tabua_mare_backend_single {
    server 127.0.0.1:3330 max_fails=2 fail_timeout=5s;
    server 127.0.0.1:3340 max_fails=2 fail_timeout=5s;
}

server {
    listen 9090;
    server_name _;

    client_max_body_size 20M;
    client_body_buffer_size 128k;

    location /health {
        return 200 'healthy';
        add_header Content-Type text/plain;
    }

    location /api-health {
        proxy_pass http://tabua_mare_backend_single/ping;
        proxy_set_header Host $host;
        access_log off;
    }

    location / {
        proxy_pass http://tabua_mare_backend_single;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 40;
        proxy_read_timeout 40;
        proxy_send_timeout 40;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
