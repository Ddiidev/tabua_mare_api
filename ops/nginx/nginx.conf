user nginx;
worker_processes auto;
worker_rlimit_nofile 65535;
pid /var/run/nginx.pid;

events {
    worker_connections 8192;
    multi_accept on;
    use epoll;
}

http {
    # Basic
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65s;
    keepalive_requests 1000;
    server_tokens off;
    types_hash_max_size 2048;
    map_hash_bucket_size 256;
    client_max_body_size 1m;
    default_type application/octet-stream;

    # Logging
    log_format upstream '$remote_addr - $remote_user [$time_local] '
                        '"$request" $status $body_bytes_sent '
                        '"$http_referer" "$http_user_agent" '
                        'rt=$request_time uht=$upstream_http_time uc=$upstream_connect_time urt=$upstream_response_time '
                        'us=$upstream_status uaddr=$upstream_addr';
    access_log /var/log/nginx/access.log upstream buffer=64k flush=5s;
    error_log /var/log/nginx/error.log warn;

    # MIME
    include /etc/nginx/mime.types;

    # Compression
    gzip on;
    gzip_comp_level 4;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_vary on;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # Real IP (Cloudflare -> Nginx). O firewall ja limita 80/443 a ranges
    # Cloudflare oficiais, entao CF-Connecting-IP e confiavel aqui.
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/22;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    real_ip_header CF-Connecting-IP;
    real_ip_recursive on;

    # Docker embedded DNS. Com `resolve` nos upstreams, o Nginx acompanha a
    # troca de IP quando o Coolify recria uma aplicacao A/B.
    resolver 127.0.0.11 valid=5s ipv6=off;
    resolver_timeout 2s;

    # Rate limit zone for checkout (avoid 524 from user retries)
    limit_req_zone $binary_remote_addr zone=checkout:10m rate=5r/m;

    # Map para escolher o upstream de deploy smoke. So roteia para slot
    # especifico se slot E secret baterem. Sem o secret correto, cai no
    # LB normal (tabuamare_ab). Substituir __DEPLOY_SMOKE_SECRET__ no
    # provisionamento, igual ao GitHub secret DEPLOY_SMOKE_SECRET.
    map "$http_x_tabuamare_deploy_slot:$http_x_tabuamare_deploy_secret" $tabuamare_deploy_upstream {
        default                 "tabuamare_ab";
        "A:__DEPLOY_SMOKE_SECRET__"  "tabuamare_slot_a";
        "B:__DEPLOY_SMOKE_SECRET__"  "tabuamare_slot_b";
    }

    include /etc/nginx/conf.d/*.conf;
}
