# Nginx + Certbot para tabuamare.api.br.
#
# Substitui o Traefik do Coolify no fluxo publico:
#   Cloudflare -> Nginx (TLS, A/B LB, retry) -> A ou B
#
# coolify-admin.tabuamare.api.br continua roteado pelo proxy interno do
# Coolify. O Nginx termina TLS e repassa HTTP pela rede Docker.
#
# Provisionamento: use migrate-from-coolify.sh, que valida os aliases A/B,
# renderiza somente o secret de smoke e valida a configuração antes do cutover.
#
# Let's Encrypt via DNS-01 Cloudflare (nao precisa expor 80 para ACME).
# Token Cloudflare em /root/.config/tabua-mare/cloudflare-token.ini
# (formato: dns_cloudflare_api_token = TOKEN; nao commitar).

services:
  nginx:
    # 1.30.x inclui DNS dinamico de upstream no Nginx OSS (resolve + zone).
    image: nginx:1.30.4-alpine
    container_name: tabuamare-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./conf.d:/etc/nginx/conf.d:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/log/nginx:/var/log/nginx
      - /var/www/certbot:/var/www/certbot:ro
    networks:
      - coolify
      - tabuamare-nginx

  certbot:
    image: certbot/dns-cloudflare:latest
    container_name: tabuamare-certbot
    restart: unless-stopped
    # Compartilha o namespace de processos do Nginx para que o deploy-hook
    # possa enviar HUP ao master sem conceder acesso ao docker.sock.
    pid: "service:nginx"
    depends_on:
      - nginx
    # Loop de renovacao. Se o certificado ainda nao foi emitido, o renew
    # nao faz nada (no-op) e tenta de novo em 12h. A emissao inicial e'
    # feita pelo certbot/issue.sh (que roda certbot certonly --dns-cloudflare).
    entrypoint: >
      /bin/sh -c "trap exit TERM;
      while :; do
        certbot renew --quiet --dns-cloudflare --dns-cloudflare-credentials /run/secrets/cloudflare-token.ini --deploy-hook 'kill -HUP 1 2>/dev/null || true' 2>&1;
        sleep 12h;
      done"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - /var/www/certbot:/var/www/certbot
      - /root/.config/tabua-mare/cloudflare-token.ini:/run/secrets/cloudflare-token.ini:ro
    networks:
      - tabuamare-nginx

networks:
  coolify:
    external: true
    name: coolify
  tabuamare-nginx:
    external: true
    name: tabuamare-nginx
