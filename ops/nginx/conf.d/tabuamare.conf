# Upstreams A/B. Os aliases sao configurados nas aplicacoes regulares do
# Coolify e permanecem estaveis quando o container e recriado no deploy. O
# `resolve` e as zones fazem o Nginx acompanhar o novo IP via Docker DNS.
# passive health check: se um upstream falha (timeout, 502, 503, 504, reset),
# nginx marca o upstream como DOWN por fail_timeout e usa o outro.
# proxy_next_upstream tenta o proximo upstream automaticamente.
upstream tabuamare_ab {
    zone tabuamare_ab 64k;
    least_conn;
    server tabuamare-app-a:3330 resolve max_fails=1 fail_timeout=30s;
    server tabuamare-app-b:3330 resolve max_fails=1 fail_timeout=30s;
    keepalive 32;
    keepalive_requests 1000;
    keepalive_timeout 60s;
}

# Slot-specific upstreams para deploy smoke (X-Tabuamare-Deploy-Slot).
# A/B deploy smoke usa esses aqui para nao passar pelo LB.
upstream tabuamare_slot_a {
    zone tabuamare_slot_a 64k;
    server tabuamare-app-a:3330 resolve;
    keepalive 8;
}
upstream tabuamare_slot_b {
    zone tabuamare_slot_b 64k;
    server tabuamare-app-b:3330 resolve;
    keepalive 8;
}

# Proxy interno do Coolify. O coolify-proxy para de publicar 80/443 no host e
# fica acessivel so pela rede coolify na porta 80. O Nginx roteia
# coolify-admin.tabuamare.api.br para ele. O Traefik continua servindo o
# painel do Coolify (coolify:8080) sem nenhuma mudanca no Coolify.
upstream coolify_admin {
    zone coolify_admin 64k;
    server coolify-proxy:80 resolve;
    keepalive 8;
}

# HTTP -> HTTPS redirect (Cloudflare tambem faz, mas nginx garante).
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name tabuamare.api.br www.tabuamare.api.br coolify-admin.tabuamare.api.br;

    # Healthcheck do proprio nginx (sem TLS).
    location /nginx-health {
        access_log off;
        return 200 'ok\n';
        add_header Content-Type text/plain;
    }

    # ACME http-01 fallback (nao usado com DNS-01, mas mantido).
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    return 301 https://$host$request_uri;
}

# Apex: tabuamare.api.br
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name tabuamare.api.br;

    ssl_certificate /etc/letsencrypt/live/tabuamare.api.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tabuamare.api.br/privkey.pem;

    # TLS modern
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HSTS
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Proxy comum para todas as rotas.
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";

    # Rede Docker local: 1s e suficiente para conectar. Se um slot estiver
    # morto, o usuario chega ao peer saudavel sem pagar varios segundos.
    proxy_connect_timeout 1s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;

    # Se o upstream falhar (timeout, 502, 503, 504, reset, http_500),
    # tenta o proximo upstream. Nao retenta em 400/401/403/404/429
    # porque esses sao erros do cliente, nao do servidor.
    proxy_next_upstream error timeout http_500 http_502 http_503 http_504 invalid_header;
    proxy_next_upstream_tries 2;
    proxy_next_upstream_timeout 3s;

    # Slots de deploy: roteia via map (valida slot + secret). Sem o
    # secret correto, cai no LB normal tabuamare_ab.
    location / {
        proxy_pass http://$tabuamare_deploy_upstream;
    }

    # /health/debug e' somente diagnostico por slot. Sem o par slot+secret,
    # o map cai no LB normal; neste endpoint, isso deve ser 404 para evitar
    # expor estado das dependencias publicamente.
    location = /health/debug {
        if ($tabuamare_deploy_upstream = "tabuamare_ab") {
            return 404;
        }
        proxy_pass http://$tabuamare_deploy_upstream;
    }

    # Rate limit no checkout para evitar 524 por retry do usuario.
    location = /auth/checkout {
        limit_req zone=checkout burst=10 nodelay;
        proxy_pass http://tabuamare_ab;
    }

    # Webhook do Stripe sem rate limit (eventos vem do Stripe).
    location = /auth/webhook {
        proxy_pass http://tabuamare_ab;
    }
}

# www -> apex redirect.
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.tabuamare.api.br;

    ssl_certificate /etc/letsencrypt/live/tabuamare.api.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tabuamare.api.br/privkey.pem;

    return 301 https://tabuamare.api.br$request_uri;
}

# coolify-admin: roteia para o proxy interno do Coolify. O coolify-proxy
# para de publicar 80/443 no host e so atende na rede coolify. O Nginx
# e' o unico proxy na borda. O Traefik continua servindo o painel do
# Coolify sem nenhuma mudanca dentro do Coolify.
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name coolify-admin.tabuamare.api.br;

    ssl_certificate /etc/letsencrypt/live/tabuamare.api.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tabuamare.api.br/privkey.pem;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";

    proxy_connect_timeout 5s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    location / {
        proxy_pass http://coolify_admin;
    }
}
