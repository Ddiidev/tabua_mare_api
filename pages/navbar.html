<a class="skip-link" href="#main-content">Pular para o conteúdo</a>
<header class="site-nav-shell">
  <nav class="site-nav container" aria-label="Navegação principal">
    <a href="/" class="site-nav__brand" aria-label="Tábua de Marés — início">
      <img src="/pages/assets/favicon-192x192.png" alt="" width="40" height="40" />
      <span>Tábua de Marés</span>
      <small>API</small>
    </a>

    <button class="site-nav__toggle mobile-menu-btn" type="button" onclick="toggleMobileMenu()"
      aria-label="Abrir menu" aria-controls="mobileMenu" aria-expanded="false">
      <svg width="24" height="24" fill="none" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M4 7h16M4 12h16M4 17h16" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
      </svg>
    </button>

    <div class="site-nav__links navbar-menu">
      <a href="/#produto">Produto</a>
      <a href="/docs">Docs</a>
      <a href="/playground">Playground</a>
      <a href="/#planos">Planos</a>
      <a href="https://github.com/Ddiidev/tabua_mare_api" target="_blank" rel="noreferrer">
        GitHub <span aria-hidden="true">↗</span>
      </a>
      <#if is_logged_in>
        <a href="/dashboard" class="site-nav__account">Dashboard</a>
      <#else>
        <a href="/auth/google" class="site-nav__account">Entrar</a>
      </#if>
    </div>
  </nav>

  <div class="mobile-menu" id="mobileMenu">
    <nav class="mobile-menu-content container" aria-label="Navegação móvel">
      <a href="/#produto">Produto</a>
      <a href="/docs">Documentação</a>
      <a href="/playground">Playground</a>
      <a href="/#planos">Planos</a>
      <a href="/apoiar">Apoiar projeto</a>
      <a href="https://github.com/Ddiidev/tabua_mare_api" target="_blank" rel="noreferrer">GitHub ↗</a>
      <#if is_logged_in>
        <a href="/dashboard" class="site-nav__account">Dashboard</a>
      <#else>
        <a href="/auth/google" class="site-nav__account">Entrar com Google</a>
      </#if>
    </nav>
  </div>

  <#noparse>
    <script>
      function setMobileMenu(open) {
        const menu = document.getElementById('mobileMenu');
        const button = document.querySelector('.site-nav__toggle');
        if (!menu || !button) return;
        menu.classList.toggle('show', open);
        button.setAttribute('aria-expanded', open ? 'true' : 'false');
        button.setAttribute('aria-label', open ? 'Fechar menu' : 'Abrir menu');
      }

      function toggleMobileMenu() {
        const menu = document.getElementById('mobileMenu');
        setMobileMenu(!menu.classList.contains('show'));
      }

      document.addEventListener('DOMContentLoaded', function () {
        document.querySelectorAll('.mobile-menu a').forEach(function (link) {
          link.addEventListener('click', function () { setMobileMenu(false); });
        });

        document.addEventListener('click', function (event) {
          const menu = document.getElementById('mobileMenu');
          const button = document.querySelector('.site-nav__toggle');
          if (menu && button && !menu.contains(event.target) && !button.contains(event.target)) {
            setMobileMenu(false);
          }
        });

        document.addEventListener('keydown', function (event) {
          if (event.key === 'Escape') {
            setMobileMenu(false);
            const button = document.querySelector('.site-nav__toggle');
            if (button) button.focus();
          }
        });
      });
    </script>
  </#noparse>
</header>
